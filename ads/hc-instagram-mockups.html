        <div style="position:absolute;bottom:40px;left:0;right:0;background:linear-gradient(transparent 0%,rgba(26,35,50,0.9) 40%,rgba(26,35,50,0.98) 100%);padding:60px 18px 16px;">
          <div style="color:rgba(255,255,255,0.85);font-size:12px;line-height:1.4;margin-bottom:6px;">${c.overlay}</div>
          <div style="color:white;font-size:20px;font-weight:800;line-height:1.12;margin-bottom:12px;">${c.headline}</div>
          <div style="display:inline-flex;align-items:center;gap:5px;background:${CORAL};color:white;padding:7px 16px;border-radius:5px;font-size:12px;font-weight:700;">${c.cta} ›</div>
        </div>
        <div style="position:absolute;bottom:10px;left:0;right:0;text-align:center;">
          <div style="display:inline-block;background:white;color:${NAVY};font-size:12px;font-weight:700;padding:8px 24px;border-radius:20px;">Learn More</div>
        </div>
      </div>
    </div>
  </div>
  <!-- Copy ref -->
  <div style="background:white;border-radius:12px;padding:20px;margin:24px 0;box-shadow:0 1px 6px rgba(0,0,0,0.06);">
    <h3 style="font-size:15px;font-weight:700;color:${NAVY};margin:0 0 12px;">Ad Copy — ${c.id}: "${c.name}"</h3>
    <div style="display:grid;grid-template-columns:120px 1fr;gap:8px 16px;font-size:13px;">
      <div style="font-weight:600;color:${SLATE};">Text Overlay</div><div>${c.overlay.replace(/<br>/g,' ')}</div>
      <div style="font-weight:600;color:${SLATE};">Headline</div><div>${c.headline.replace(/<br>/g,' ')}</div>
      <div style="font-weight:600;color:${SLATE};">CTA</div><div style="color:${CORAL};font-weight:600;">${c.cta}</div>
      <div style="font-weight:600;color:${SLATE};padding-top:8px;border-top:1px solid #eee;">Primary Text</div>
      <div style="color:#555;line-height:1.6;padding-top:8px;border-top:1px solid #eee;">${c.primary}</div>
    </div>
  </div>
  <!-- Brand colors -->
  <div style="display:flex;gap:16px;justify-content:center;padding-bottom:32px;flex-wrap:wrap;">
    <div style="display:flex;align-items:center;gap:6px;"><div style="width:16px;height:16px;border-radius:4px;background:#1A2332;border:1px solid #ddd;"></div><span style="font-size:11px;color:${SLATE};">Navy #1A2332</span></div>
    <div style="display:flex;align-items:center;gap:6px;"><div style="width:16px;height:16px;border-radius:4px;background:#E8845A;border:1px solid #ddd;"></div><span style="font-size:11px;color:${SLATE};">Coral #E8845A</span></div>
    <div style="display:flex;align-items:center;gap:6px;"><div style="width:16px;height:16px;border-radius:4px;background:#F8F9FC;border:1px solid #ddd;"></div><span style="font-size:11px;color:${SLATE};">Cool White #F8F9FC</span></div>
    <div style="display:flex;align-items:center;gap:6px;"><div style="width:16px;height:16px;border-radius:4px;background:#5A6578;border:1px solid #ddd;"></div><span style="font-size:11px;color:${SLATE};">Slate #5A6578</span></div>
  </div>`;
}
render();
</script>
</body>
</html>
